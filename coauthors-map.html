<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>My Coauthors - Interactive Map</title>
  <link rel="stylesheet" href="style.css">
  <!-- Leaflet for map -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <!-- Leaflet Geoman for country boundaries -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mapbox/mapbox-gl@2.15.0/dist/mapbox-gl.css" />
  <script src="https://cdn.jsdelivr.net/npm/geojson-world-map@1.0.0/countries.min.js"></script>
  <style>
    #coauthors-map-container {
      position: relative;
      margin: 20px 0;
    }

    #map {
      width: 100%;
      height: 600px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .coauthor-tooltip {
      background-color: #fff;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      max-width: 250px;
      z-index: 1000;
    }

    .coauthor-tooltip h4 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }

    .coauthor-list {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }

    .coauthor-list li {
      padding: 4px 0;
      color: #555;
      border-bottom: 1px solid #eee;
    }

    .coauthor-list li:last-child {
      border-bottom: none;
    }

    .country-active {
      cursor: pointer;
      filter: brightness(1.1);
    }

    .country-active:hover {
      filter: brightness(1.2);
    }

    .map-legend {
      background-color: #fff;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-size: 13px;
      line-height: 1.6;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .legend-color-box {
      width: 20px;
      height: 20px;
      margin-right: 8px;
      border-radius: 3px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <section id="coauthors">
    <h2>My Coauthors</h2>
    <p>Explore my research collaborations around the world. Hover over countries to see my coauthors from that region.</p>
    
    <div id="coauthors-map-container">
      <div id="map"></div>
    </div>

    <div class="map-legend" style="margin-top: 15px;">
      <div class="legend-item">
        <div class="legend-color-box" style="background-color: #4CAF50;"></div>
        <span>Countries with coauthors</span>
      </div>
      <div class="legend-item">
        <div class="legend-color-box" style="background-color: #e0e0e0;"></div>
        <span>Other countries</span>
      </div>
    </div>
  </section>

  <script>
    // Initialize map
    const map = L.map('map').setView([20, 0], 2);

    // Add tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19
    }).addTo(map);

    // Coauthors data structure
    // Format: { "CountryCode": ["Coauthor Name", "Another Coauthor", ...], ... }
    const coauthorsByCountry = {
      "BE": ["Jean-François Raskin", "Marie van den Bogaard"],
      "FR": ["Example Coauthor 1"],
      "AT": ["Thomas A. Henzinger", "Example Coauthor 2"],
      "DE": ["Example Coauthor 3"],
      "US": ["Example Coauthor 4", "Example Coauthor 5"],
      // Add more countries as needed
    };

    // Country code to country name mapping
    const countryNames = {
      "BE": "Belgium",
      "FR": "France",
      "AT": "Austria",
      "DE": "Germany",
      "US": "United States",
      // Add more as needed
    };

    // Color scheme
    const colors = {
      active: "#4CAF50",
      inactive: "#e0e0e0",
      hover: "#66BB6A"
    };

    // Fetch world GeoJSON
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(response => response.json())
      .then(data => {
        // Convert to feature collection
        const features = topojson.feature(data, data.objects.countries).features;
        
        // Add country polygons to map
        L.geoJSON(features, {
          style: function(feature) {
            const countryCode = getCountryCode(feature);
            const hasCoauthors = coauthorsByCountry[countryCode];
            
            return {
              fillColor: hasCoauthors ? colors.active : colors.inactive,
              weight: 1,
              opacity: 1,
              color: '#999',
              fillOpacity: 0.7
            };
          },
          onEachFeature: function(feature, layer) {
            const countryCode = getCountryCode(feature);
            const countryName = countryNames[countryCode] || feature.properties.name;
            const coauthors = coauthorsByCountry[countryCode];

            let popupContent = `<strong>${countryName}</strong>`;
            
            if (coauthors) {
              popupContent += '<ul class="coauthor-list">';
              coauthors.forEach(coauthor => {
                popupContent += `<li>${coauthor}</li>`;
              });
              popupContent += '</ul>';
            } else {
              popupContent += '<p style="font-size: 12px; color: #999; margin: 8px 0 0 0;">No coauthors</p>';
            }

            layer.bindPopup(popupContent);

            if (coauthors) {
              layer.on('mouseover', function() {
                this.setStyle({ fillColor: colors.hover, fillOpacity: 0.9 });
              });
              layer.on('mouseout', function() {
                this.setStyle({ fillColor: colors.active, fillOpacity: 0.7 });
              });
            }
          }
        }).addTo(map);
      })
      .catch(error => console.error('Error loading map data:', error));

    // Helper function to get country code from feature
    function getCountryCode(feature) {
      // This depends on the GeoJSON structure - adjust as needed
      return feature.id ? String(feature.id).padStart(3, '0') : null;
    }
  </script>

  <!-- TopoJSON library for processing world data -->
  <script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
</body>
</html>
